{% extends 'tasks/base.html' %}
{% block content %}
<div style="max-width:420px; margin:60px auto;">
    <div class="card">
        <h2 class="page-title" style="text-align:center;">Welcome Back 👋</h2>
        <p style="text-align:center; color:#888; margin-bottom:24px;">Login to your TaskMaster account</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password">
            </div>
            {% if form.errors %}
                <div class="alert alert-danger">Invalid username or password. Try again.</div>
            {% endif %}
            <button class="btn btn-primary" type="submit" style="width:100%; padding:12px; font-size:16px;">
                Login 🚀
            </button>
        </form>
        <p style="text-align:center; margin-top:20px; font-size:14px; color:#888;">
            Don't have an account? <a href="/signup/" style="color:#667eea; font-weight:600;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
